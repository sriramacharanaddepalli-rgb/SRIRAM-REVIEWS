<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Reviews | Cinema Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page">
        <header class="main-header">
            <h1>SRIRAM REVIEWS</h1>
            <nav class="main-nav">
                <button onclick="openCategory('review')">Movie Reviews</button>
                <button onclick="openCategory('news')">Industry News</button>
            </nav>
        </header>

        <main class="container">
            <section id="media-hub">
                <div class="media-section">
                    <h2>📸 Poster & Image Gallery</h2>
                    <div id="image-grid" class="grid"></div>
                </div>
            </section>

            <section class="admin-panel">
                <h3>Creator Studio</h3>
                <input type="text" id="title" placeholder="Post Title (e.g. Vihanga Update)">
                <select id="category">
                    <option value="review">Movie Review</option>
                    <option value="news">Cinema News</option>
                </select>
                <label for="img-input" style="font-size: 12px; color: #888;">Upload Image:</label>
                <input type="file" id="img-input" accept="image/*">
                <textarea id="content" placeholder="Write your story or review here..."></textarea>
                <button onclick="handlePublish()">Publish to Portfolio</button>
            </section>
        </main>
    </div>

    <div id="white-page" class="hidden">
        <nav class="white-nav">
            <button onclick="closeCategory()" class="back-btn">← Back to Home</button>
            <h2 id="page-title">Category Name</h2>
        </nav>
        <div class="container">
            <div id="category-content"></div>
        </div>
    </div>

    <footer style="text-align: center; padding: 20px; color: #444;">
        <p>&copy; 2026 Sriram Reviews</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
