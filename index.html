<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Reviews | Cinema Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page">
        <header class="main-header">
            <h1>SRIRAM REVIEWS</h1>
            <nav class="category-nav">
                <button onclick="openWriter('review')">Movie Reviews +</button>
                <button onclick="openWriter('news')">Movie News +</button>
            </nav>
        </header>

        <main class="container">
            <section class="media-hub">
                <div class="media-header">
                    <h2>Videos</h2>
                    <button class="plus-btn" onclick="openMediaModal('video')">+</button>
                </div>
                <div id="video-grid" class="grid"></div>

                <div class="media-header">
                    <h2>Images</h2>
                    <button class="plus-btn" onclick="openMediaModal('image')">+</button>
                </div>
                <div id="image-grid" class="grid"></div>
            </section>
        </main>
    </div>

    <div id="media-modal" class="hidden modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">Upload File</h3>
            <div class="modal-options">
                <label id="file-label" for="media-file">Choose Media File:</label>
                <input type="file" id="media-file">
            </div>
            <div class="modal-btns">
                <button class="save-btn" onclick="saveMediaFile()">Upload to Section</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="writer-page" class="hidden">
        </div>

    <script src="script.js"></script>
</body>
</html>
