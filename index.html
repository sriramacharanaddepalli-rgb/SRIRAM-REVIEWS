<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Reviews | Cinema Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page">
        <header class="main-header">
            <h1>SRIRAM REVIEWS</h1>
            <nav class="category-nav">
                <button onclick="openWriter('review')">Movie Reviews +</button>
                <button onclick="openWriter('news')">Movie News +</button>
            </nav>
        </header>

        <main class="container">
            <section class="media-hub">
                <div class="media-header">
                    <h2>Videos</h2>
                    <button class="plus-btn" onclick="openMediaModal('video')">+</button>
                </div>
                <div id="video-grid" class="grid"></div>

                <div class="media-header">
                    <h2>Images</h2>
                    <button class="plus-btn" onclick="openMediaModal('image')">+</button>
                </div>
                <div id="image-grid" class="grid"></div>
            </section>
        </main>
    </div>

    <div id="media-modal" class="hidden modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">Upload to Gallery</h3>
            <input type="file" id="media-file-input">
            <div class="modal-btns">
                <button class="save-btn" onclick="saveMediaFile()">Upload</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="writer-page" class="hidden">
        <nav class="white-nav">
            <button onclick="closeWriter()" class="back-btn">← Home</button>
            <h2 id="writer-title">Studio</h2>
        </nav>
        <div class="writer-container">
            <div class="toolbar">
                <button onclick="format('bold')">B</button>
                <button onclick="format('italic')">I</button>
                <input type="file" id="post-img-input" accept="image/*" style="display:none">
                <button onclick="document.getElementById('post-img-input').click()">📷 Add Image</button>
            </div>
            <input type="text" id="post-title" placeholder="Title...">
            <textarea id="post-body" placeholder="Write your review or news..."></textarea>
            <button class="submit-btn" onclick="submitPost()">Submit Post</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
