<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Reviews | Filmmaker Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page">
        <header class="main-header">
            <h1>SRIRAM REVIEWS</h1>
            <nav class="category-nav">
                <button onclick="openWriter('review')">Movie Reviews +</button>
                <button onclick="openWriter('news')">Movie News +</button>
            </nav>
        </header>

        <main class="container">
            <section class="media-hub">
                <div class="media-header">
                    <h2>🎬 Videos</h2>
                    <button class="plus-btn" onclick="openMediaLink('video')">+</button>
                </div>
                <div id="video-grid" class="grid"></div>

                <div class="media-header">
                    <h2>📸 Images</h2>
                    <button class="plus-btn" onclick="openMediaLink('image')">+</button>
                </div>
                <div id="image-grid" class="grid"></div>
            </section>
        </main>
    </div>

    <div id="writer-page" class="hidden">
        <nav class="white-nav">
            <button onclick="closeWriter()" class="back-btn">← Home</button>
            <h2 id="writer-title">Drafting...</h2>
        </nav>
        <div class="writer-container">
            <div class="toolbar">
                <button onclick="format('bold')">B</button>
                <button onclick="format('italic')">I</button>
                <button onclick="format('underline')">U</button>
            </div>
            <input type="text" id="post-title" placeholder="Enter Title Here...">
            <textarea id="post-body" placeholder="Start writing your script or review analysis..."></textarea>
            <button class="submit-btn" onclick="submitPost()">Submit Post</button>
        </div>
    </div>

    <div id="media-modal" class="hidden">
        <div class="modal-box">
            <h3 id="modal-title">Add Media</h3>
            <input type="text" id="media-input" placeholder="Enter YouTube Link or Image URL">
            <div class="modal-btns">
                <button onclick="saveMedia()">Save</button>
                <button onclick="closeMedia()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
