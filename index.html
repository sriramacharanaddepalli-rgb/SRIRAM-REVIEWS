<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Reviews | Director's Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-page">
        <header class="main-header">
            <h1>SRIRAM REVIEWS</h1>
            <nav class="main-nav">
                <button onclick="openCategory('review')">Movie Reviews</button>
                <button onclick="openCategory('news')">Industry News</button>
            </nav>
        </header>

        <main class="container">
            <section id="media-hub">
                <div class="media-section">
                    <h2>🎬 Video Gallery</h2>
                    <div id="video-grid" class="grid"></div>
                </div>
                <div class="media-section">
                    <h2>📸 Image Gallery</h2>
                    <div id="image-grid" class="grid"></div>
                </div>
            </section>

            <section class="admin-panel">
                <h3>Creator Studio</h3>
                <input type="text" id="title" placeholder="Title">
                <select id="category">
                    <option value="review">Review</option>
                    <option value="news">News</option>
                </select>
                <input type="file" id="img-input" accept="image/*">
                <input type="text" id="vid-input" placeholder="YouTube Video ID">
                <textarea id="content" placeholder="Story/Review content..."></textarea>
                <button onclick="handlePublish()">Publish Now</button>
            </section>
        </main>
    </div>

    <div id="white-page" class="hidden">
        <nav class="white-nav">
            <button onclick="closeCategory()" class="back-btn">← Back to Home</button>
            <h2 id="page-title">Category Name</h2>
        </nav>
        <div class="container">
            <div id="category-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
