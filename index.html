<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Reviews | Cinema & News</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>SRIRAM REVIEWS</h1>
            <p>The Ultimate Archive for Tollywood Fans</p>
        </div>
    </header>

    <nav class="filter-nav">
        <div class="container">
            <button onclick="filterContent('all')" class="btn-filter">
                Show All Feed
            </button>
            <button onclick="filterContent('review')" class="btn-filter">
                Movie Reviews
            </button>
            <button onclick="filterContent('news')" class="btn-filter">
                Latest News
            </button>
        </div>
    </nav>

    <main class="container">
        <section id="admin-panel">
            <div class="card-editor">
                <h2>Create New Content</h2>
                
                <div class="input-group">
                    <input type="text" id="post-title" placeholder="Enter Movie Title or News Headline...">
                </div>

                <div class="input-group">
                    <label for="post-category">Select Category:</label>
                    <select id="post-category">
                        <option value="review">Movie Review</option>
                        <option value="news">Movie News</option>
                    </select>
                </div>

                <div class="input-group">
                    <textarea id="post-content" placeholder="Write your full analysis or update here..."></textarea>
                </div>
                
                <div class="action-row">
                    <button id="publish-btn" onclick="savePost()">
                        Publish to Archive
                    </button>
                </div>
            </div>
        </section>

        <hr class="divider">

        <section id="content-display">
            <div class="section-title">
                <h2 id="view-indicator">Current Feed: All</h2>
            </div>
            
            <div id="display-list" class="grid-layout">
                <p class="empty-msg">No posts found. Start writing above!</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Sriram Reviews</p>
            <p>B.Tech Student | Aspiring Filmmaker | Scriptwriter</p>
            <p>Follow my YouTube: @SriramMovieReviews</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>
</html>
